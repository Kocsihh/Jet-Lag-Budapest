<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Jet Lag: Budapest - Lobby</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="toast.css">
</head>

<body>
    <div class="container">
        <h1>JET LAG<br><span style="color:white; font-size: 0.5em; vertical-align: middle;">BUDAPEST</span></h1>

        <!-- 1. Képernyő: Csatlakozás / Létrehozás -->
        <div id="screen-join">
            <div class="form-group">
                <input type="text" id="playerName" placeholder="Neved (pl. Peti)" maxlength="15">
            </div>
            <button class="primary" onclick="createRoom()">Új Játék Létrehozása</button>
            <div style="margin: 20px 0; color: #666;">VAGY</div>
            <div class="form-group">
                <input type="text" id="roomCodeInput" placeholder="Szobakód (pl. ABCD)" maxlength="4"
                    style="text-transform: uppercase;">
            </div>
            <button onclick="joinRoom()">Csatlakozás Játékhoz</button>
            <div style="margin-top: 30px;">
                <button onclick="window.location.href='./szabalyok.html'"
                    style="background: transparent; border: 1px solid #ff4500; color: #ff4500; font-size: 1rem; padding: 10px;">📖
                    Játékszabályok</button>
            </div>
        </div>

        <!-- 2. Képernyő: Váróterem (Lobby) -->
        <div id="screen-lobby" class="hidden">
            <h3 style="margin-top:0;">Szobakód:</h3>
            <div id="roomCodeDisplay">ABCD</div>

            <button id="btnHider" class="role-btn" onclick="selectRole('hider')">
                <span>🏃 Bújó leszek</span>
                <span class="role-count" id="countHider">0/3</span>
            </button>
            <button id="btnSeeker" class="role-btn" onclick="selectRole('seeker')">
                <span>🕵️ Hunyó leszek</span>
                <span class="role-count" id="countSeeker">0/3</span>
            </button>

            <div class="player-list" id="playerList">
                <!-- Játékosok ide jönnek -->
            </div>

            <button id="btnStartGame" class="primary hidden" onclick="startGame()">▶ Játék Indítása</button>
            <p id="waitingMsg" style="color:#888; font-size:0.9em;">Várakozás a játékmesterre...</p>
        </div>
    </div>

    <div class="footer">
        v2.2 - Multiplayer-Semi-Syncronized Edition
    </div>


    <script src="toast.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="firebase_config.js"></script>

    <!-- Lobby Logic -->
    <script src="index.js"></script>
</body>

</html>
