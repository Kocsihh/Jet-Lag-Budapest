<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <title>Runner Deck | Jet Lag Budapest</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="toast.css">
    <link rel="stylesheet" href="deck.css">
    <link rel="stylesheet" href="dialog.css">

    <!-- Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDMOAqGuk1x3mCk9_SeL98wY7g7pXi3sn0&libraries=geometry"
        async defer></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="firebase_config.js"></script>
</head>

<body>
    <div id="room-code-display" class="room-code-box" style="display:none;" title="Szobakód"></div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const code = localStorage.getItem('local_roomId');
            if (code) {
                const el = document.getElementById('room-code-display');
                el.innerText = `Kód: ${code}`;
                el.style.display = 'block';
            }
        });
    </script>
    <a href="./index.html" class="home-btn" title="Vissza a menübe">🏠</a>
    <a href="./szabalyok.html" target="_blank" class="rules-btn" title="Játékszabályok">📖</a>

    <h1>ROHANÓ PAKLI</h1>

    <!-- ==========================================
         TAB BAR
         ========================================== -->
    <div class="tab-bar">
        <button class="tab-btn active" id="tab-btn-deck" onclick="switchDeckTab('deck')">
            <span class="tab-icon">🃏</span>
            <span>Pakli</span>
        </button>
        <button class="tab-btn" id="tab-btn-question" onclick="switchDeckTab('question')">
            <span class="tab-icon">❓</span>
            <span>Kérdés</span>
            <span id="question-badge"
                style="display:none; background:#e67e22; color:#fff; border-radius:50%; width:16px; height:16px; font-size:10px; line-height:16px; text-align:center; margin-left:4px; flex-shrink:0;">!</span>
        </button>
        <button class="tab-btn" id="tab-btn-map" onclick="switchDeckTab('map')">
            <span class="tab-icon">🗺️</span>
            <span>Térkép</span>
        </button>
    </div>

    <!-- ==========================================
         TAB CONTENT: DECK
         ========================================== -->
    <div id="tab-deck" class="tab-content active">
        <div class="stats" id="deck-stats">Pakli: --/--</div>

        <div class="controls" id="dynamic-draw-controls">
            <button id="btn1" onclick="drawChoice(1)">Húzz 1</button>
            <button id="btn2" onclick="drawChoice(2)">Húzz 2</button>
            <button id="btn3" onclick="drawChoice(3)">Húzz 3</button>
            <button class="btn-reset" onclick="resetDeck()">Reset</button>
        </div>

        <div id="selection-area"></div>

        <div id="active-effects-section" style="display: none;">
            <h2>AKTÍV HATÁSOK</h2>
            <div id="active-effects-display"></div>
        </div>

        <div id="inventory-section">
            <h2>KÉZNÉL LÉVŐ LAPOK</h2>
            <div id="inventory-display"></div>
        </div>

        <!-- Payment info sticky bar -->
        <div id="status-bar"></div>
    </div>

    <!-- ==========================================
         TAB CONTENT: MAP
         ========================================== -->
    <div id="tab-map" class="tab-content">
        <div id="map-status-bar">A Hunyók helyzete a térképen</div>
        <div class="map-controls">
            <!-- Bújóknak is elérhető a radar és hőmérő -->
            <button class="btn-location off" id="myLocationBtn" onclick="toggleMyLocation()">📍 Helyzetem</button>
            <button class="btn-radar" onclick="promptCustomRadar()">R Egyéni</button>
            <button class="btn-thermo" onclick="startThermometer(2000)">Hő 2km</button>
            <button class="btn-thermo" onclick="startThermometer(5000)">Hő 5km</button>
            <button class="btn-swap" id="swapBtn" onclick="swapColors()" style="display:none;">Színcsere</button>
            <button class="btn-reset-map" onclick="clearAll()">Törlés</button>
            <button class="btn-toggle" id="districtBtn" onclick="toggleDistricts()">Kerületek: KI</button>
            <button class="btn-toggle off" id="editDistBtn" onclick="toggleDistrictEditing()">Szerkesztés: KI</button>
            <button class="btn-toggle" id="tramBtn" onclick="toggleTrams()">Villamosok: BE</button>
            <button class="btn-hiders" id="hidersBtn" onclick="togglePossibleHiders()">Megállók (500m): KI</button>
        </div>
        <div id="map"></div>
    </div>

    <!-- ==========================================
         TAB CONTENT: QUESTION
         ========================================== -->
    <div id="tab-question" class="tab-content">
        <div class="question-tab-container">
            <div id="question-tab-inner">
                <div class="no-question-msg">
                    <span style="font-size:3rem">💭</span>
                    <p>Nincs aktív kérdés</p>
                    <p style="font-size:0.8rem; color:var(--text-dim)">Amikor a hunyó feltesz egy kérdést, itt fog
                        megjelenni.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="storage.js"></script>
    <script src="toast.js"></script>
    <script src="dialog.js"></script>
    <script src="cards.js"></script>
    <script src="deck.js"></script>
    <script src="map_data.js"></script>
    <script src="map.js?v=2"></script>
    <script src="deck_tabs.js"></script>
</body>

</html>
