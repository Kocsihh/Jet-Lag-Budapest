<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runner Deck | Jet Lag Budapest</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="toast.css">
    <link rel="stylesheet" href="dialog.css">
</head>

<body>
    <a href="./index.html" class="home-btn" title="Vissza a menübe">🏠</a>

    <h1>ROHANÓ PAKLI</h1>
    <div class="stats" id="deck-stats">Pakli: --/--</div>

    <div class="controls">
        <button id="btn1" onclick="drawChoice(1)">Húzz 1</button>
        <button id="btn2" onclick="drawChoice(2)">Húzz 2</button>
        <button id="btn3" onclick="drawChoice(3)">Húzz 3</button>
        <button class="btn-reset" onclick="resetDeck()">Reset</button>
    </div>

    <div id="selection-area"></div>

    <div id="active-effects-section" style="display: none;">
        <h2>AKTÍV HATÁSOK</h2>
        <div id="active-effects-display"></div>
    </div>

    <div id="inventory-section">
        <h2>KÉZNÉL LÉVŐ LAPOK</h2>
        <div id="inventory-display"></div>
    </div>

    <!-- Payment info sticky bar -->
    <div id="status-bar"></div>

    <script src="storage.js"></script>
    <script src="toast.js"></script>
    <script src="dialog.js"></script>
    <script src="cards.js"></script>
    <script src="deck.js"></script>
</body>

</html>
