<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <title>Budapest Radar & Hőmérő + Búvóhelyek</title>
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDMOAqGuk1x3mCk9_SeL98wY7g7pXi3sn0&libraries=geometry" async defer></script>
    <link rel="stylesheet" href="map.css">
    <link rel="stylesheet" href="toast.css">
</head>

<body>
    <div id="room-code-display" class="room-code-box" style="display:none;" title="Szobakód"></div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const code = localStorage.getItem('local_roomId');
            if (code) {
                const el = document.getElementById('room-code-display');
                el.innerText = `Kód: ${code}`;
                el.style.display = 'block';
            }
        });
    </script>
    <a href="./index.html" class="home-btn" title="Vissza a menübe" onclick="localStorage.setItem('intentional_leave','true')">🏠</a>
    <div id="status-bar">Válassz egy pontot a térképen!</div>
    <div id="map"></div>

    <div class="controls">
        <button class="btn-toggle" id="tramBtn" onclick="toggleTrams()">Villamosok: BE</button>
        <button class="btn-toggle" id="districtBtn" onclick="toggleDistricts()">Kerületek: KI</button>
        <button class="btn-toggle off" id="editDistBtn" onclick="toggleDistrictEditing()">Szerkesztés: KI</button>

        <!-- Radarok -->
        <button class="btn-radar" onclick="drawRadar(500)">R 500m</button>
        <button class="btn-radar" onclick="drawRadar(1000)">R 1km</button>
        <button class="btn-radar" onclick="promptCustomRadar()">R Egyéni</button>
        <!-- <button class="btn-radar" onclick="drawRadar(2000)">R 2km</button> -->
        <!-- Helyspórolás miatt kikommentelve, de visszarakható -->

        <!-- Hőmérők -->
        <button class="btn-thermo" onclick="startThermometer(2000)">Hő 2km</button>
        <button class="btn-thermo" onclick="startThermometer(5000)">Hő 5km</button>

        <!-- Új Funkció -->
        <button class="btn-hiders" onclick="togglePossibleHiders()">Megállók (500m)</button>

        <button class="btn-swap" id="swapBtn" onclick="swapColors()">Színcsere</button>

        <button class="btn-location off" id="myLocationBtn" onclick="toggleMyLocation()">📍 Helyzetem</button>

        <button class="btn-reset" onclick="clearAll()">Törlés</button>
    </div>

    <script src="storage.js"></script>
    <script src="toast.js"></script>
    <script src="map_data.js"></script>
    <script src="map.js?v=2"></script>
</body>

</html>
