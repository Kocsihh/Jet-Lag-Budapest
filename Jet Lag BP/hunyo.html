<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <title>Hunyó Központ | Jet Lag Budapest</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDMOAqGuk1x3mCk9_SeL98wY7g7pXi3sn0&libraries=geometry"
        async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="toast.css">
    <link rel="stylesheet" href="dialog.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="firebase_config.js"></script>
</head>

<body>
    <div id="room-code-display" class="room-code-box" style="display:none;" title="Szobakód"></div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const code = localStorage.getItem('local_roomId');
            if (code) {
                const el = document.getElementById('room-code-display');
                el.innerText = `Kód: ${code}`;
                el.style.display = 'block';
            }
        });
    </script>
    <a href="./index.html" class="home-btn" title="Vissza a menübe">🏠</a>
    <a href="./szabalyok.html" target="_blank" class="rules-btn" title="Játékszabályok">📖</a>

    <h1>HUNYÓ KÖZPONT</h1>

    <!-- ==========================================
         TAB BAR
         ========================================== -->
    <div class="tab-bar">
        <button class="tab-btn active" id="tab-btn-questions" onclick="switchHunyoTab('questions')">
            <span class="tab-icon">🕵️</span>
            <span>Kérdések</span>
        </button>
        <button class="tab-btn" id="tab-btn-curses" onclick="switchHunyoTab('curses')">
            <span class="tab-icon">☠️</span>
            <span>Átkok</span>
            <span id="curse-badge"
                style="display:none; background:#e74c3c; color:#fff; border-radius:50%; padding:0 5px; font-size:11px; margin-left:4px;"></span>
        </button>
        <button class="tab-btn" id="tab-btn-map" onclick="switchHunyoTab('map')">
            <span class="tab-icon">🗺️</span>
            <span>Térkép</span>
        </button>
    </div>

    <!-- ==========================================
         TAB CONTENT: QUESTIONS (HUNYO)
         ========================================== -->
    <div id="tab-questions" class="tab-content active">
        <div class="game-controls">
            <button id="btn-start-game" class="session-btn start" onclick="startGame()">▶ Játék Indítása</button>
            <button id="btn-end-game" class="session-btn end" onclick="endGame()" style="display: none;">⏹
                Befejezés</button>
        </div>

        <!-- STOPWATCH + ELKAPTUK -->
        <div class="game-status-bar">
            <div class="stopwatch-wrap">
                <div class="stopwatch-label">Játékidő</div>
                <div id="stopwatch-display" class="stopwatch-display">00:00</div>
            </div>
            <button class="btn-caught" onclick="caughtHider()">🛑 ELKAPTUK!</button>
        </div>

        <div id="timer-container">
            <div class="timer-msg" id="timer-label">Várakozás...</div>
            <div id="timer-display">00:00</div>
            <div class="timer-controls">
                <button class="control-btn undo" onclick="undoLast()">⏪ Visszavonás</button>
                <button class="control-btn reset" onclick="resetTimer()">⏹ Timer Törlése</button>
            </div>
        </div>

        <!-- FOLYAMATBAN LÉVŐ KÉRDÉS JELZő -->
        <div id="pending-question-banner" style="display:none;"></div>

        <div class="dashboard-grid" id="main-grid">
            <!-- 1. FOTÓ -->
            <div class="category-section section-egyezeto">
                <div class="category-title">Egyezetető kérdések</div>
                <div class="button-grid">
                    <button class="q-btn" onclick="askQuestion('Pest/Buda', 5, false, '', 2, 2)">
                        <span>Pest/Buda (2,2)</span><span class="reward-info">5p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Ugyanaz a villamosvonal?', 5, false, '', 2, 1)">
                        <span>Ugyanaz a villamosvonal? (2,1)</span><span class="reward-info">5p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Ugyanaz a metróvonal?', 5, false, '', 2, 1)">
                        <span>Ugyanaz a metróvonal? (2,1)</span><span class="reward-info">5p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Ugyanaz a kerület?', 5, false, '', 2, 1)">
                        <span>Ugyanaz a kerület? (2,1)</span><span class="reward-info">5p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Ugyanaz a legközelebbi kórház?', 5, false, '', 2, 1)">
                        <span>Ugyanaz a legközelebbi kórház? (2,1)</span><span class="reward-info">5p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Ugyanaz a legközelebbi mozi?', 5, false, '', 2, 1)">
                        <span>Ugyanaz a legközelebbi mozi? (2,1)</span><span class="reward-info">5p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Ugyanaz a legközelebbi Meki?', 5, false, '', 2, 1)">
                        <span>Ugyanaz a legközelebbi Meki? (2,1)</span><span class="reward-info">5p timer</span>
                    </button>
                </div>
            </div>

            <!-- 2. KERÜLET -->
            <div class="category-section section-mero">
                <div class="category-title">Mérő kérdések (2,1)</div>
                <div class="button-grid">
                    <button class="q-btn" onclick="askQuestion('Kórház?', 5, false, '', 2, 1)">
                        <span>Kórház?</span><span class="reward-info">5p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Mozi?', 5, false, '', 2, 1)">
                        <span>Mozi?</span><span class="reward-info">5p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Meki?', 5, false, '', 2, 1)">
                        <span>Meki?</span><span class="reward-info">5p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Reptér?', 5, false, '', 2, 1)">
                        <span>Reptér?</span><span class="reward-info">5p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Állatkert?', 5, false, '', 2, 1)">
                        <span>Állatkert?</span><span class="reward-info">5p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Budapest Park?', 5, false, '', 2, 1)">
                        <span>Budapest Park?</span><span class="reward-info">5p timer</span>
                    </button>
                </div>
            </div>

            <!-- 3. KÖZLEKEDÉS -->
            <div class="category-section section-radar">
                <div class="category-title"> Radar (3,1)</div>
                <div class="button-grid">
                    <button class="q-btn" onclick="askQuestion('Radar 500m?', 5, false, '', 3, 1)">
                        <span>Radar 500m?</span><span class="reward-info">5p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Radar 1km?', 10, false, '', 3, 1)">
                        <span>Radar 1km?</span><span class="reward-info">10p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Radar egyéni?', 10, false, '', 3, 1)">
                        <span>Radar egyéni?</span><span class="reward-info">10p timer</span>
                    </button>
                </div>
            </div>

            <!-- 4. KÖRNYEZET -->
            <div class="category-section section-homero">
                <div class="category-title">Hőmérő (3,1)</div>
                <div class="button-grid">
                    <button class="q-btn" onclick="askQuestion('Hőmérő 2km?', 5, false, '', 3, 1)">
                        <span>Hőmérő 2km?</span><span class="reward-info">5p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Hőmérő 5km?', 5, false, '', 3, 1)">
                        <span>Hőmérő 5km?</span><span class="reward-info">5p timer</span>
                    </button>
                </div>
            </div>

            <div class="category-section section-fotó">
                <div class="category-title">Fotó kérdések</div>
                <div class="button-grid">
                    <button class="q-btn" onclick="askQuestion('Legmagasabb épület', 10, true, '', 3, 1)">
                        <span>Legmagasabb épület(3,1)</span><span class="reward-info">10p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Állomás', 10, true, '', 3, 1)">
                        <span>Állomás(3,1)</span><span class="reward-info">10p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Égbolt', 10, true, '', 2, 1)">
                        <span>Égbolt(2,1)</span><span class="reward-info">10p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Fa', 10, true, '', 2, 1)">
                        <span>Fa(2,1)</span><span class="reward-info">10p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Szelfi', 10, true, '', 2, 1)">
                        <span>Szelfi(2,1)</span><span class="reward-info">10p timer</span>
                    </button>
                    <button class="q-btn" onclick="askQuestion('Legszélesebb út', 10, true, '', 3, 1)">
                        <span>Legszélesebb út(3,1)</span><span class="reward-info">10p timer</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="log">
            <div class="log-header">
                <h3>📝 History</h3>
                <span class="stats" id="log-count">0 bejegyzés</span>
            </div>
            <div id="log-content"></div>
        </div>
    </div>

    <!-- ==========================================
         TAB CONTENT: MAP
         ========================================== -->
    <div id="tab-map" class="tab-content">
        <div id="map-status-bar">Válassz egy pontot a térképen!</div>

        <div class="map-controls">
            <!-- Toggles -->
            <button class="btn-toggle" id="tramBtn" onclick="toggleTrams()">Villamosok: BE</button>
            <button class="btn-toggle" id="districtBtn" onclick="toggleDistricts()">Kerületek: KI</button>
            <button class="btn-toggle off" id="editDistBtn" onclick="toggleDistrictEditing()">Szerkesztés: KI</button>
            <!-- Radarok -->
            <button class="btn-radar" onclick="drawRadar(500)">R 500m</button>
            <button class="btn-radar" onclick="drawRadar(1000)">R 1km</button>
            <button class="btn-radar" onclick="promptCustomRadar()">R Egyéni</button>

            <!-- Hőmérők -->
            <button class="btn-thermo" onclick="startThermometer(2000)">Hő 2km</button>
            <button class="btn-thermo" onclick="startThermometer(5000)">Hő 5km</button>

            <!-- Új Funkció -->
            <button class="btn-hiders off" id="hidersBtn" onclick="togglePossibleHiders()">Megállók (500m): KI</button>
            <button class="btn-swap" id="swapBtn" onclick="swapColors()">Színcsere</button>
            <button class="btn-location off" id="myLocationBtn" onclick="toggleMyLocation()">📍 Helyzetem</button>
            <button class="btn-reset-map" onclick="clearAll()">Törlés</button>
        </div>

        <div id="map"></div>
    </div>

    <!-- ==========================================
         TAB CONTENT: CURSES (ÁTKOK)
         ========================================== -->
    <div id="tab-curses" class="tab-content">
        <div class="curses-container">
            <div class="curses-header">
                <h2>☠️ Aktív Átkok</h2>
                <p class="curses-subtitle">A bújók által kijátszott, jelenleg aktív átkok</p>
            </div>
            <div id="curses-list">
                <div class="no-curses-msg">
                    <span style="font-size:3rem">✨</span>
                    <p>Jelenleg nincsenek aktív átkok!</p>
                </div>
            </div>
        </div>
    </div>


    <script src="storage.js"></script>
    <script src="toast.js"></script>
    <script src="dialog.js"></script>
    <script src="map_data.js"></script>
    <script src="map.js?v=2"></script>
    <script src="hunyo.js"></script>
    <script src="hunyo_tabs.js"></script>

    <!-- ELKAPTUK MODAL -->
    <div id="caught-modal"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center;">
        <div class="caught-modal-inner">
            <div id="caught-body"></div>
            <button class="caught-close-btn" onclick="closeCaughtModal()">Bezárás</button>
        </div>
    </div>

</body>

</html>
