<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jet Lag Budapest: Hunyó Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="hunyo.css">
    <link rel="stylesheet" href="toast.css">
</head>

<body>
    <a href="./index.html" class="home-btn">🏠</a>
    <header>
        <h1>Hunyó Dashboard</h1>
        <div class="game-controls">
            <button id="btn-start-game" class="session-btn start" onclick="startGame()">Játék Indítása</button>
            <button id="btn-end-game" class="session-btn end" onclick="endGame()" style="display: none;">Játék
                Vége</button>
        </div>
        <div class="stats">Válassz kérdést és rögzítsd a választ!</div>
    </header>

    <!-- Outcome Selection Modal -->
    <div id="outcome-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="outcome-q-name">Kérdés neve</h2>
            <div class="outcome-options">
                <button class="outcome-btn" onclick="handleOutcome('answered')">
                    <strong>VÁLASZOLT</strong>
                    <span>Timer + Kérdés kuka</span>
                </button>
                <button class="outcome-btn" onclick="handleOutcome('veto')">
                    <strong>VÉTÓ</strong>
                    <span>Timer + Kérdés marad</span>
                </button>
                <button class="outcome-btn" onclick="handleOutcome('superveto')">
                    <strong>SZUPER VÉTÓ</strong>
                    <span>Timer + Kérdés kuka</span>
                </button>
            </div>
            <button class="modal-cancel" onclick="closeOutcomeModal()">Mégse</button>
        </div>
    </div>

    <!-- Timer Section -->
    <div id="timer-container">
        <div class="timer-msg" id="timer-label">Várakozás a következő kérdésig...</div>
        <div id="timer-display">05:00</div>
        <div class="timer-controls">
            <button class="control-btn undo" onclick="undoLast()">Visszavonás</button>
            <button class="control-btn reset" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <div class="dashboard-grid" id="main-grid">
        <!-- Egyeztető questions -->
        <section class="category-section">
            <div class="category-title">🤝 Egyeztető Kérdések</div>
            <div class="button-grid">
                <button class="q-btn" onclick="askQuestion('Pest / Buda (3 lap)', 5, '2/2')">
                    <span>Pest / Buda</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 2</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Ugyanaz a villamosvonal?', 5, '2/1')">
                    <span>Ugyanaz a villamosvonal?</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Ugyanaz a metróvonal?', 5, '2/1')">
                    <span>Ugyanaz a metróvonal?</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Ugyanaz a kerület?', 5, '2/1')">
                    <span>Ugyanaz a Kerület?</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Legközelebbi kórház?', 5, '2/1')">
                    <span>Legközelebbi Kórház?</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Legközelebbi mozi?', 5, '2/1')">
                    <span>legközelebbi mozi?</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Legközelebbi Meki?', 5, '2/1')">
                    <span>Legközelebbi Meki?</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
            </div>
        </section>

        <!-- Mérő questions -->
        <section class="category-section">
            <div class="category-title">📏 Mérő Kérdések</div>
            <div class="button-grid">
                <button class="q-btn" onclick="askQuestion('Közelebb: Kórház?', 5, '2/1')">
                    <span>Kórház?</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Közelebb: Mozi?', 5, '2/1')">
                    <span>Mozi?</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Közelebb: Meki?', 5, '2/1')">
                    <span>Meki?</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Közelebb: Reptér', 5, '2/1')">
                    <span>Reptér</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Közelebb: Állatkert', 5, '2/1')">
                    <span>Állatkert</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Közelebb: Vidámpark', 5, '2/1')">
                    <span>Vidámpark</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
            </div>
        </section>

        <!-- Radar -->
        <section class="category-section">
            <div class="category-title">📡 Radar</div>
            <div class="button-grid">
                <button class="q-btn" onclick="askQuestion('Radar: 500m', 5, '3/1')">
                    <span>500m</span>
                    <div class="reward-info">Húzz: 3 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Radar: 1km', 5, '3/1')">
                    <span>1km</span>
                    <div class="reward-info">Húzz: 3 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Radar: Egyéni', 5, '3/1')">
                    <span>Egyéni</span>
                    <div class="reward-info">Húzz: 3 / Tarts: 1</div>
                </button>
            </div>
        </section>

        <!-- Hőmérő -->
        <section class="category-section">
            <div class="category-title">🌡️ Hőmérő</div>
            <div class="button-grid">
                <button class="q-btn" onclick="askQuestion('Hőmérő: 2km', 5, '3/1')">
                    <span>2km</span>
                    <div class="reward-info">Húzz: 3 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Hőmérő: 5km', 5, '3/1')">
                    <span>5km</span>
                    <div class="reward-info">Húzz: 3 / Tarts: 1</div>
                </button>
            </div>
        </section>

        <!-- Fotó -->
        <section class="category-section section-foto">
            <div class="category-title">📸 Fotó Kihívások</div>
            <div class="button-grid">
                <button class="q-btn" onclick="askQuestion('Fotó: Legmagasabb épület', 10, '3/1')">
                    <span>Legmagasabb épület</span>
                    <div class="reward-info">Húzz: 3 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Fotó: Az állomásról egy fotó', 10, '3/1')">
                    <span>Állomás</span>
                    <div class="reward-info">Húzz: 3 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Fotó: Égbolt', 10, '2/1')">
                    <span>Égbolt</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Fotó: Egy fa', 10, '2/1')">
                    <span>Egy fa</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Fotó: Szelfi', 10, '2/1')">
                    <span>Szelfi</span>
                    <div class="reward-info">Húzz: 2 / Tarts: 1</div>
                </button>
                <button class="q-btn" onclick="askQuestion('Fotó: Legszélesebb út', 10, '3/1')">
                    <span>Legszélesebb út</span>
                    <div class="reward-info">Húzz: 3 / Tarts: 1</div>
                </button>
            </div>
        </section>
    </div>

    <!-- Log -->
    <div id="log">
        <div class="log-header">
            <strong>ELŐZMÉNYEK</strong>
            <span id="log-count" style="font-size: 0.8rem; opacity: 0.5;">0 bejegyzés</span>
        </div>
        <div id="log-content"></div>
    </div>

    <script src="storage.js"></script>
    <script src="toast.js"></script>
    <script src="hunyo.js"></script>
</body>

</html>
